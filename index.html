<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 로봇 러너</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&family=Noto+Sans+KR:wght@500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #050010; font-family: 'Jua', sans-serif; }

/* 캔버스 레이어 */
canvas { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }
#bgCanvas { z-index: 1; }
#gameCanvas { z-index: 2; }

/* ── HUD (상단 UI) ── */
#hud { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: linear-gradient(to bottom, rgba(5,0,20,0.9), rgba(5,0,20,0)); z-index: 10; display: flex; align-items: center; padding: 0 20px; gap: 20px; }
.hud-item { display: flex; flex-direction: column; }
.hud-label { font-size: 0.75rem; color: #00e5ff; letter-spacing: 1px; margin-bottom: 2px; }
.hud-val { font-family: 'Black Han Sans'; font-size: 1.6rem; color: #ffe600; text-shadow: 0 0 10px rgba(255,230,0,0.5); line-height: 1; }

/* HP 체력 게이지 바 */
#hpWrapper { flex: 1; max-width: 300px; display: flex; flex-direction: column; gap: 4px; }
#hpContainer { width: 100%; height: 18px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 9px; overflow: hidden; box-shadow: 0 0 10px rgba(255,45,155,0.2); }
#hpBar { width: 100%; height: 100%; background: linear-gradient(to right, #ff2d9b, #ff758c); transition: width 0.1s linear; }

/* 스킬 게이지 */
#skillWrapper { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(0,229,255,0.3); }
#skillCanvas { width: 32px; height: 32px; }

/* ── 컨트롤 버튼 (하단) ── */
.ctrl-btn { position: fixed; bottom: 20px; width: 90px; height: 90px; border-radius: 50%; border: 3px solid; background: rgba(10, 0, 30, 0.85); font-family: 'Black Han Sans'; font-size: 1.1rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; backdrop-filter: blur(5px); transition: transform 0.1s; }
.ctrl-btn:active { transform: scale(0.9); }
#btnJump { left: 20px; border-color: #00e5ff; color: #00e5ff; box-shadow: 0 0 15px rgba(0,229,255,0.4); }
#btnSlide { right: 20px; border-color: #ffe600; color: #ffe600; box-shadow: 0 0 15px rgba(255,230,0,0.3); }
/* 레이저 모드 전환 시 스타일 */
#btnSlide.laser-ready { border-color: #ff2d9b; color: #fff; background: #ff2d9b; box-shadow: 0 0 25px #ff2d9b; animation: pulse 0.6s infinite alternate; }
@keyframes pulse { to { box-shadow: 0 0 35px #ff758c; transform: scale(1.05); } }

.btn-sub { font-family: 'Jua'; font-size: 0.6rem; opacity: 0.7; margin-top: 2px; }

/* ── AI OX 퀴즈 패널 ── */
#quizPanel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); background: rgba(10, 2, 25, 0.96); border: 3px solid #00e5ff; padding: 25px; border-radius: 12px; z-index: 20; width: 90%; max-width: 420px; text-align: center; box-shadow: 0 0 30px rgba(0,229,255,0.4); opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
#quizPanel.open { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
#qTitle { font-size: 0.8rem; color: #ff2d9b; letter-spacing: 2px; margin-bottom: 8px; }
#qText { font-family: 'Noto Sans KR'; font-size: 1.05rem; color: #fff; line-height: 1.6; margin-bottom: 22px; word-break: keep-all; }
.q-btns { display: flex; gap: 15px; }
.q-btn { flex: 1; padding: 14px; border: 2px solid; font-family: 'Black Han Sans'; font-size: 1.2rem; border-radius: 8px; cursor: pointer; background: transparent; transition: background 0.2s; }
.q-btn.yes { border-color: #39ff14; color: #39ff14; }
.q-btn.yes:active { background: rgba(57,255,20,0.2); }
.q-btn.no { border-color: #ff2d9b; color: #ff2d9b; }
.q-btn.no:active { background: rgba(255,45,155,0.2); }

/* ── 화면 오버레이 (타이틀 / 게임오버) ── */
.screen { position: fixed; inset: 0; background: linear-gradient(135deg, #120024, #050012); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: opacity 0.3s; }
.screen.hidden { opacity: 0; pointer-events: none; }
.title-text { font-family: 'Black Han Sans'; font-size: 3.5rem; color: #fff; text-shadow: 0 0 20px #ff2d9b, 0 0 40px #ff2d9b; text-align: center; line-height: 1.1; margin-bottom: 10px; }
.sub-text { color: #00e5ff; letter-spacing: 3px; font-size: 1rem; margin-bottom: 35px; }
.start-btn { padding: 16px 45px; font-family: 'Black Han Sans'; font-size: 1.4rem; color: #ff2d9b; background: transparent; border: 3px solid #ff2d9b; border-radius: 8px; cursor: pointer; box-shadow: 0 0 15px rgba(255,45,155,0.3); transition: all 0.2s; }
.start-btn:hover { background: rgba(255,45,155,0.15); transform: scale(1.05); }

/* 게임 오버 통계 */
.go-score { font-family: 'Black Han Sans'; font-size: 4.5rem; color: #ffe600; text-shadow: 0 0 25px #ffe600; margin-bottom: 20px; }

/* 텍스트 이펙트 피드백 */
#toast { position: fixed; top: 25%; left: 50%; transform: translate(-50%, -50%); font-family: 'Black Han Sans'; font-size: 2rem; z-index: 15; pointer-events: none; opacity: 0; }
#toast.pop { animation: toastAnim 0.8s ease-out forwards; }
@keyframes toastAnim { 0% { opacity: 0; transform: translate(-50%, 0) scale(0.7); } 20% { opacity: 1; transform: translate(-50%, -20px) scale(1.1); } 80% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -50px) scale(1); } }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="gameCanvas"></canvas>

<div id="hud" style="display:none;">
  <div class="hud-item" id="hpWrapper">
    <div id="hpContainer"><div id="hpBar"></div></div>
  </div>
  <div style="flex:1;"></div>
  <div class="hud-item" id="skillWrapper">
    <span class="hud-label" style="color:#ff2d9b;">LASER</span>
    <canvas id="skillCanvas"></canvas>
  </div>
  <div class="hud-item">
    <span class="hud-label">SCORE</span>
    <span class="hud-val" id="scoreVal">0</span>
  </div>
</div>

<button id="btnJump" class="ctrl-btn" style="display:none;">점프<span class="btn-sub">JUMP</span></button>
<button id="btnSlide" class="ctrl-btn" style="display:none;">슬라이드<span class="btn-sub">SLIDE</span></button>

<div id="quizPanel">
  <div id="qTitle">◈ AI 홀로그램 네트워크 가동 ◈</div>
  <div id="qText">퀴즈 내용이 여기에 표시됩니다.</div>
  <div class="q-btns">
    <button class="q-btn yes" id="btnYes">O 진실</button>
    <button class="q-btn no" id="btnNo">X 거짓</button>
  </div>
</div>

<div id="toast"></div>

<div class="screen" id="titleScreen">
  <h1 class="title-text">AI 로봇<br>러너</h1>
  <p class="sub-text">인터넷 세상을 달리는 탐정 로봇</p>
  <button class="start-btn" id="btnStart">시스템 가동 (시작)</button>
</div>

<div class="screen hidden" id="overScreen">
  <h1 class="title-text" style="color:#ff2d9b; text-shadow:0 0 15px #ff2d9b;">SYSTEM FAILURE</h1>
  <p class="sub-text" style="color:#fff; margin-bottom:10px;">최종 획득 점수</p>
  <div class="go-score" id="goScore">0</div>
  <button class="start-btn" id="btnRetry" style="color:#00e5ff; border-color:#00e5ff; box-shadow:0 0 15px rgba(0,229,255,0.3);">재부팅 (다시 시작)</button>
</div>

<script>
/* ═══════════════════════ AI 퀴즈 데이터 ═══════════════════════ */
const QUIZZES = [
  { t: "AI 언어 모델은 문장 다음에 올 가장 확률이 높은 단어를 예측하며 작동합니다.", v: true },
  { t: "현재 대화형 AI는 인간과 똑같이 감정을 직접 느끼고 인지할 수 있습니다.", v: false },
  { t: "인공지능 이미지 생성기는 무에서 창조하는 것이 아니라, 대량의 데이터 패턴을 기반으로 그립니다.", v: true },
  { t: "AI는 학습한 데이터에 편향이나 차별이 섞여 있으면, 그대로 차별적인 결과를 출력할 수 있습니다.", v: true },
  { t: "최신 AI 챗봇이 말하는 모든 정보는 교차검증 없이 100% 사실로 믿어도 안전합니다.", v: false },
  { t: "AI 환각(Hallucination) 현상이란 AI가 마치 사실인 것처럼 거짓말을 그럴듯하게 지어내는 오류를 말합니다.", v: true },
  { t: "컴퓨터 바이러스나 악성코드는 오직 인간 해커만 만들 수 있으며 AI는 생성하지 못합니다.", v: false }
];

/* ═══════════════════════ 엔진 설정 및 변수 ═══════════════════════ */
const gc = document.getElementById('gameCanvas');
const gx = gc.getContext('2d');
const bc = document.getElementById('bgCanvas');
const bx = bc.getContext('2d');
const sc = document.getElementById('skillCanvas');
const sx = sc.getContext('2d');

let W, H, GY; 
let gameState = 'title';
let score, hp, lastTime, speed;
let robotY, robotVY, isJumping, jumpCount, isSliding, slideTimer;
let skillTime, laserActive, laserActiveTimer, laserCount;
let objects, spawnTimer, quizTimer, isQuizOpen, currentQuiz;

const ROBOT_X = 120;
const ROBOT_W = 50;
const ROBOT_H = 65;
const GRAVITY = 0.65;
const JUMP_FORCE = -15;

function resize() {
  W = gc.width = bc.width = window.innerWidth;
  H = gc.height = bc.height = window.innerHeight;
  GY = H - 130; // 바닥 높이 지정
}
window.addEventListener('resize', resize);
resize();

/* ═══════════════════════ 게임 초기화 ═══════════════════════ */
function initGame() {
  score = 0;
  hp = 240;
  speed = 7;
  robotY = GY - ROBOT_H;
  robotVY = 0;
  isJumping = false;
  jumpCount = 0;
  isSliding = false;
  slideTimer = 0;
  skillTime = 0; 
  laserActive = false;
  laserActiveTimer = 0;
  laserCount = 0;
  objects = [];
  spawnTimer = 0;
  quizTimer = 3000; // 첫 퀴즈는 3초 뒤 출현
  isQuizOpen = false;
  currentQuiz = null;

  document.getElementById('hud').style.display = 'flex';
  document.getElementById('btnJump').style.display = 'flex';
  document.getElementById('btnSlide').style.display = 'flex';
  document.getElementById('quizPanel').classList.remove('open');
  updateHUD();
}

/* ═══════════════════════ 상단 UI 처리 ═══════════════════════ */
function updateHUD() {
  document.getElementById('scoreVal').textContent = Math.floor(score);
  const hpPercent = Math.max(0, (hp / 240) * 100);
  document.getElementById('hpBar').style.width = hpPercent + '%';
  drawSkillCircle();
  
  const slideBtn = document.getElementById('btnSlide');
  if (skillTime >= 25000 && !laserActive) {
    slideBtn.classList.add('laser-ready');
    slideBtn.innerHTML = `레이저!<span class="btn-sub">READY: ${3 - laserCount}회</span>`;
  } else if (laserActive) {
    slideBtn.classList.add('laser-ready');
    slideBtn.innerHTML = `방출 중!<span class="btn-sub">BURST</span>`;
  } else {
    slideBtn.classList.remove('laser-ready');
    slideBtn.innerHTML = `슬라이드<span class="btn-sub">SLIDE</span>`;
  }
}

function drawSkillCircle() {
  sx.clearRect(0,0,32,32);
  sx.beginPath();
  sx.arc(16,16,14,0,Math.PI*2);
  sx.strokeStyle = 'rgba(255,255,255,0.1)';
  sx.lineWidth = 3;
  sx.stroke();

  sx.beginPath();
  sx.arc(16,16,14, -Math.PI/2, (-Math.PI/2) + (Math.PI*2 * (Math.min(25000, skillTime)/25000)));
  sx.strokeStyle = skillTime >= 25000 ? '#ff2d9b' : '#00e5ff';
  sx.lineWidth = 3;
  sx.stroke();
}

function showToast(text, color) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.style.color = color;
  t.style.textShadow = `0 0 10px ${color}`;
  t.classList.remove('pop');
  void t.offsetWidth; 
  t.classList.add('pop');
}

/* ═══════════════════════ 핵심 게임 루프 ═══════════════════════ */
function loop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  let dt = timestamp - lastTime;
  lastTime = timestamp;
  if (dt > 100) dt = 16.66; // 렉 방지 가드

  if (gameState === 'playing' && !isQuizOpen) {
    update(dt);
  }
  render();
  requestAnimationFrame(loop);
}

/* ═══════════════════════ 데이터 업데이트 ═══════════════════════ */
function update(dt) {
  // 1. 자연 체력 감소 (1초에 -1)
  hp -= (dt / 1000);
  if (hp <= 0) { hp = 0; gameOver(); return; }

  // 2. 스킬 쿨타임 충전 (최대 25초)
  if (!laserActive && skillTime < 25000) {
    skillTime += dt;
  }

  // 3. 레이저 활성화 타이머 제어
  if (laserActive) {
    laserActiveTimer -= dt;
    // 레이저가 가동되는 동안 사정거리 안의 모든 장애물 일괄 제거
    objects.forEach(obj => {
      if (obj.type === 'obs' && !obj.destroyed) {
        obj.destroyed = true;
        score += 3000;
        showToast("💥 장애물 파괴! +3000", "#ff2d9b");
      }
    });
    if (laserActiveTimer <= 0) {
      laserActive = false;
      if (laserCount >= 3) {
        skillTime = 0; // 3번 다 썼으면 쿨타임 리셋
        laserCount = 0;
      }
    }
  }

  // 4. 캐릭터 물리 엔진 (점프/슬라이드)
  if (isSliding) {
    slideTimer -= dt;
    if (slideTimer <= 0) isSliding = false;
  }

  robotVY += GRAVITY;
  robotY += robotVY;
  const currentFloor = isSliding ? GY - (ROBOT_H * 0.5) : GY - ROBOT_H;
  if (robotY >= currentFloor) {
    robotY = currentFloor;
    robotVY = 0;
    isJumping = false;
    jumpCount = 0;
  }

  // 5. 오브젝트 이동 및 스폰 생성
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnObject();
    spawnTimer = 600 + Math.random() * 800; // 랜덤 생성 주기
  }

  // 퀴즈 스폰 타이머
  quizTimer -= dt;
  if (quizTimer <= 0) {
    spawnQuizPortal();
    quizTimer = 16000 + Math.random() * 6000; // 16~22초 간격 퀴즈
  }

  // 배경 및 요소들 전진
  objects.forEach(obj => obj.x -= speed);
  objects = objects.filter(obj => obj.x > -150);

  // 6. 충돌 검사 알고리즘
  const rx1 = ROBOT_X;
  const rx2 = ROBOT_X + ROBOT_W;
  const ry1 = robotY;
  const ry2 = robotY + (isSliding ? ROBOT_H * 0.5 : ROBOT_H);

  objects.forEach(obj => {
    if (obj.hit || obj.destroyed) return;

    // 충돌 박스 판정
    if (rx2 > obj.x && rx1 < obj.x + obj.w && ry2 > obj.y && ry1 < obj.y + obj.h) {
      if (obj.type === 'obs') {
        obj.hit = true;
        hp -= 10;
        showToast("💥 충돌! HP -10", "#ff0055");
      } else if (obj.type === 'jelly_bulb') {
        obj.hit = true;
        score += 1000;
      } else if (obj.type === 'jelly_bolt') {
        obj.hit = true;
        score += 5000;
        hp = Math.min(240, hp + 5);
        showToast("⚡ 번개 파워! HP +5", "#ffe600");
      } else if (obj.type === 'quiz_portal') {
        obj.hit = true;
        triggerQuiz();
      }
    }
  });

  updateHUD();
}

/* ═══════════════════════ 생성 시스템 ═══════════════════════ */
function spawnObject() {
  const rand = Math.random();
  if (rand < 0.5) {
    // 전구 젤리 배치 (공중 혹은 바닥 패턴)
    const jY = Math.random() > 0.5 ? GY - 40 : GY - 90;
    objects.push({ type: 'jelly_bulb', x: W + 20, y: jY, w: 25, h: 30 });
  } else if (rand < 0.6) {
    // 희귀한 번개 젤리 배치
    const jY = GY - 80;
    objects.push({ type: 'jelly_bolt', x: W + 20, y: jY, w: 28, h: 32 });
  } else {
    // 장애물 배치 (높은 벽식장애물거인/낮은장애물)
    const isTall = Math.random() > 0.6;
    const oH = isTall ? 65 : 35;
    const oY = GY - oH;
    objects.push({ type: 'obs', x: W + 30, y: oY, w: 35, h: oH, isTall: isTall });
  }
}

function spawnQuizPortal() {
  objects.push({ type: 'quiz_portal', x: W + 40, y: GY - 110, w: 70, h: 110 });
}

/* ═══════════════════════ 그래픽 드로잉 ═══════════════════════ */
function render() {
  // 1. 역동적 배경 드로잉 (bgCanvas)
  bx.fillStyle = '#0a021a';
  bx.fillRect(0, 0, W, H);
  
  // 그리드 스크롤 효과
  const lineOff = (performance.now() * 0.2) % 60;
  bx.strokeStyle = 'rgba(0, 229, 255, 0.08)';
  bx.lineWidth = 2;
  for (let x = -lineOff; x < W; x += 60) {
    bx.beginPath(); bx.moveTo(x, GY); bx.lineTo(x - 200, H); bx.stroke();
  }

  // 2. 게임 메인 화면 그리기 (gameCanvas)
  gx.clearRect(0, 0, W, H);

  // 사이버 네온 바닥 바 그리기
  gx.fillStyle = '#140534';
  gx.fillRect(0, GY, W, H - GY);
  gx.strokeStyle = '#00e5ff';
  gx.lineWidth = 4;
  gx.beginPath(); gx.moveTo(0, GY); gx.lineTo(W, GY); gx.stroke();

  // 오브젝트 드로잉
  objects.forEach(obj => {
    if (obj.hit || obj.destroyed) return;
    
    if (obj.type === 'jelly_bulb') {
      gx.fillStyle = '#ffe600';
      gx.font = '24px serif';
      gx.fillText('💡', obj.x, obj.y + 22);
    } else if (obj.type === 'jelly_bolt') {
      gx.fillStyle = '#ff00aa';
      gx.font = '26px serif';
      gx.fillText('⚡', obj.x, obj.y + 24);
    } else if (obj.type === 'obs') {
      gx.fillStyle = obj.isTall ? '#ff0055' : '#b700ff';
      // 사이버 방화벽 벽돌 느낌 시각화
      gx.fillRect(obj.x, obj.y, obj.w, obj.h);
      gx.strokeStyle = '#fff';
      gx.lineWidth = 1;
      gx.strokeRect(obj.x, obj.y, obj.w, obj.h);
    } else if (obj.type === 'quiz_portal') {
      // 퀴즈 게이트 연출
      const pulsedGlow = 8 + Math.sin(performance.now() * 0.01) * 4;
      gx.fillStyle = 'rgba(0, 229, 255, 0.2)';
      gx.strokeStyle = '#00e5ff';
      gx.lineWidth = 3;
      gx.fillRect(obj.x, obj.y, obj.w, obj.h);
      gx.strokeRect(obj.x, obj.y, obj.w, obj.h);
      
      gx.fillStyle = '#fff';
      gx.font = 'bold 13px Noto Sans KR';
      gx.textAlign = 'center';
      gx.fillText('AI QUIZ', obj.x + obj.w/2, obj.y + obj.h/2);
      gx.textAlign = 'left';
    }
  });

  // 레이저 이펙트 가동
  if (laserActive) {
    const lGrad = gx.createLinearGradient(ROBOT_X + ROBOT_W, 0, W, 0);
    lGrad.addColorStop(0, 'rgba(255, 45, 155, 1)');
    lGrad.addColorStop(0.5, 'rgba(255, 230, 240, 0.9)');
    lGrad.addColorStop(1, 'rgba(255, 45, 155, 0)');
    gx.fillStyle = lGrad;
    gx.fillRect(ROBOT_X + ROBOT_W, robotY + 10, W - (ROBOT_X + ROBOT_W), 35);
  }

  // 달리는 사이보그 로봇 플레이어 드로잉
  gx.fillStyle = '#00e5ff';
  if (isSliding) {
    // 슬라이딩 상태 로봇 사각형태형태 구현
    gx.fillRect(ROBOT_X, robotY, ROBOT_W * 1.2, ROBOT_H * 0.5);
    gx.fillStyle = '#fff';
    gx.fillRect(ROBOT_X + ROBOT_W * 0.8, robotY + 6, 10, 6); // 눈 라이트
  } else {
    // 일반 스탠딩/점프형태 로봇 바디 구현
    gx.fillRect(ROBOT_X, robotY, ROBOT_W, ROBOT_H);
    // 안구 인터페이스 선
    gx.fillStyle = '#050010';
    gx.fillRect(ROBOT_X + 10, robotY + 12, ROBOT_W - 20, 12);
    gx.fillStyle = '#ffe600';
    gx.fillRect(ROBOT_X + 28, robotY + 16, 14, 4);
  }
}

/* ═══════════════════════ 액션 이벤트 ═══════════════════════ */
function doJump() {
  if (isQuizOpen || gameState !== 'playing') return;
  if (jumpCount < 2) {
    isSliding = false;
    isJumping = true;
    robotVY = JUMP_FORCE;
    jumpCount++;
  }
}

function doSlideOrLaser() {
  if (isQuizOpen || gameState !== 'playing') return;
  
  // 게이지 완료 시 레이저 능력 격발
  if (skillTime >= 25000) {
    laserActive = true;
    laserActiveTimer = 3000; // 3초 지속 파열광선
    laserCount++;
    updateHUD();
    return;
  }
  
  // 평상 시 슬라이딩 기동
  if (!isJumping) {
    isSliding = true;
    slideTimer = 550; // 슬라이딩 지속 주기(ms)
  }
}

// 마우스 및 터치 리스너 결합 연동
document.getElementById('btnJump').addEventListener('mousedown', (e) => { e.preventDefault(); doJump(); });
document.getElementById('btnJump').addEventListener('touchstart', (e) => { e.preventDefault(); doJump(); });
document.getElementById('btnSlide').addEventListener('mousedown', (e) => { e.preventDefault(); doSlideOrLaser(); });
document.getElementById('btnSlide').addEventListener('touchstart', (e) => { e.preventDefault(); doSlideOrLaser(); });

// 키보드 키 바인딩 매핑
window.addEventListener('keydown', e => {
  if (e.code === 'ArrowUp' || e.code === 'Space') doJump();
  if (e.code === 'ArrowDown') doSlideOrLaser();
});

/* ═══════════════════════ AI 퀴즈 모듈 시스템 ═══════════════════════ */
function triggerQuiz() {
  isQuizOpen = true;
  currentQuiz = QUIZZES[Math.floor(Math.random() * QUIZZES.length)];
  document.getElementById('qText').textContent = currentQuiz.t;
  document.getElementById('quizPanel').classList.add('open');
}

function handleQuizAnswer(userAnswer) {
  if (!isQuizOpen) return;
  
  if (userAnswer === currentQuiz.v) {
    score += 15000;
    showToast("✓ 정답! 데이터 보너스 수신 (+15000점)", "#39ff14");
  } else {
    hp = Math.max(0, hp - 40);
    showToast("✕ 오답! 데이터 오염 타격 (HP -40)", "#ff0055");
  }
  
  document.getElementById('quizPanel').classList.remove('open');
  isQuizOpen = false;
  updateHUD();
}

document.getElementById('btnYes').onclick = () => handleQuizAnswer(true);
document.getElementById('btnNo').onclick = () => handleQuizAnswer(false);

/* ═══════════════════════ 플로우 관리 컨트롤 ═══════════════════════ */
function startGame() {
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('overScreen').classList.add('hidden');
  gameState = 'playing';
  initGame();
}

function gameOver() {
  gameState = 'over';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('btnJump').style.display = 'none';
  document.getElementById('btnSlide').style.display = 'none';
  document.getElementById('goScore').textContent = Math.floor(score);
  document.getElementById('overScreen').classList.remove('hidden');
}

document.getElementById('btnStart').onclick = startGame;
document.getElementById('btnRetry').onclick = startGame;

// 시동 루틴 트리거 가동
requestAnimationFrame(loop);
</script>
</body>
